        // ============================================================
        // UploadTab — drag-drop + review cards
        // ============================================================
        const UploadTab = ({ token, folderIndex, apiKey, testMode, refreshIndex }) => {
            const [items, setItems] = useState([]);
            const fileInputRef = useRef(null);

            const updateItem = (id, patch) => {
                setItems(prev => prev.map(it => it.id === id ? { ...it, ...patch } : it));
            };

            // Refs so async processFile can see the latest values without stale closure
            const apiKeyRef = useRef(apiKey);
            const folderIndexRef = useRef(folderIndex);
            useEffect(() => { apiKeyRef.current = apiKey; }, [apiKey]);
            useEffect(() => { folderIndexRef.current = folderIndex; }, [folderIndex]);

            // Wait for folder index to be ready. API key is optional — if absent we
            // use local pattern matching instead of Gemini.
            const waitForPrereqs = async (id) => {
                while (true) {
                    const idx = folderIndexRef.current;
                    if (idx && idx.folders?.length) return { key: apiKeyRef.current, idx };
                    const reason = !idx ? 'Waiting for folder index to start…'
                                 : 'Waiting for folder indexing to finish…';
                    updateItem(id, { status: 'waiting', error: null, waitingReason: reason });
                    await new Promise(r => setTimeout(r, 500));
                }
            };

            // Sequential queue — chained promises ensure Gemini calls run one at a time
            // with a small delay between. Keeps us well under free tier's 15 req/min cap.
            const geminiQueueRef = useRef(Promise.resolve());
            const GEMINI_INTERVAL_MS = 5000; // ~12 req/min — stays under 2.0 Flash free tier's 15 RPM cap

            const runGeminiForItem = async (id, file, opts = {}) => {
                try {
                    // Duplicate check — compute content hash and look it up against
                    // both recentUploads (app-filed) AND driveHashIndex (any Drive file).
                    if (!opts.skipDupeCheck) {
                        updateItem(id, { status: 'waiting', waitingReason: 'Checking for duplicates…' });
                        const hash = await computeFileHash(file);
                        const dupe = findDuplicate(hash);
                        if (dupe) {
                            updateItem(id, { status: 'duplicate', dupeOf: dupe, contentHash: hash });
                            return;
                        }
                        updateItem(id, { contentHash: hash });
                    }

                    const { key, idx } = await waitForPrereqs(id);
                    updateItem(id, { status: 'processing', waitingReason: null });

                    // OCR progress callback — updates card to show OCR is happening
                    const onOcrProgress = (info) => {
                        if (info?.status === 'ocr_start') {
                            updateItem(id, { status: 'waiting', waitingReason: 'Reading document (OCR)…' });
                        } else if (info?.progress !== undefined && info?.status === 'recognizing text') {
                            const pct = Math.round(info.progress * 100);
                            const pageInfo = info.totalPages > 1 ? ` page ${info.page}/${info.totalPages}` : '';
                            updateItem(id, { status: 'waiting', waitingReason: `Reading document (OCR)${pageInfo} ${pct}%…` });
                        }
                    };

                    // If no Gemini key, local mode runs Tesseract OCR on scanned PDFs/images
                    // so we get extractable text to work with.
                    const payload = await prepareFileForNaming(file, {
                        useLocalMode: !key,
                        onOcrProgress,
                    });
                    updateItem(id, { status: 'processing', waitingReason: null });
                    const docText = payload.kind === 'text' ? payload.text : '';

                    let proposal;

                    if (key) {
                        // Try Gemini first
                        const onRateLimitWait = (sec, attempt, max) => {
                            updateItem(id, {
                                status: 'waiting',
                                waitingReason: `Rate limited — retrying in ${sec}s (try ${attempt}/${max})`,
                            });
                        };
                        try {
                            proposal = await callGemini(key, payload, idx, file.name, onRateLimitWait);
                            updateItem(id, { status: 'processing', waitingReason: null });
                        } catch (e) {
                            console.warn('[Bos Page] Gemini failed, falling back to local pattern match:', e.message);
                            // For fallback, we may need to OCR — re-prepare in local mode
                            const localPayload = payload.kind === 'text' ? payload :
                                await prepareFileForNaming(file, { useLocalMode: true, onOcrProgress });
                            proposal = proposeLocally(idx.folders, localPayload.text || '', file.name);
                            proposal.reasoning = `Gemini unavailable (${e.message.slice(0, 80)}). Used local match. ${proposal.reasoning}`;
                        }
                    } else {
                        // No API key — use local pattern matching directly
                        proposal = proposeLocally(idx.folders, docText, file.name);
                    }

                    const folder = idx.folders.find(f => displayPath(f.path) === proposal.folder_path || f.path === proposal.folder_path);
                    updateItem(id, {
                        status: 'ready',
                        proposal,
                        edits: {
                            // Leave folderId empty when no match — forces user to pick
                            folderId: folder?.id || '',
                            filename: proposal.filename || file.name,
                        },
                    });
                } catch (e) {
                    updateItem(id, { status: 'error', error: e.message || String(e) });
                }
            };

            const processFile = (file) => {
                const id = Math.random().toString(36).slice(2);
                setItems(prev => [...prev, {
                    id, file, originalName: file.name, status: 'waiting',
                    proposal: null, edits: { folderId: '', filename: '' }, error: null, webViewLink: null,
                    waitingReason: 'Queued…',
                    previewUrls: [],
                }]);
                // Generate previews async — page 1 appears fast, rest fill in as they render
                generatePreviews(file, (pagesSoFar) => {
                    updateItem(id, { previewUrls: pagesSoFar });
                }).catch(() => {});
                // Chain onto the queue so calls run sequentially
                geminiQueueRef.current = geminiQueueRef.current.then(async () => {
                    await runGeminiForItem(id, file);
                    await new Promise(r => setTimeout(r, GEMINI_INTERVAL_MS));
                });
            };

            // Retry a failed file — re-queue it
            const retryItem = (id) => {
                const it = items.find(x => x.id === id);
                if (!it) return;
                updateItem(id, { status: 'waiting', error: null, waitingReason: 'Retrying…' });
                geminiQueueRef.current = geminiQueueRef.current.then(async () => {
                    await runGeminiForItem(id, it.file);
                    await new Promise(r => setTimeout(r, GEMINI_INTERVAL_MS));
                });
            };

            const onFilesSelected = (fileList) => {
                const files = Array.from(fileList);
                if (!files.length) return;
                // No more alerts — just queue. Cards show why they're waiting.
                files.forEach(processFile);
            };

            // Listen for files dropped anywhere on the page (dispatched from App-level drag handler)
            useEffect(() => {
                const handler = (e) => {
                    const files = e.detail;
                    if (files?.length) onFilesSelected(files);
                };
                window.addEventListener('bospage:files', handler);
                return () => window.removeEventListener('bospage:files', handler);
            }, []);

            // Upload one item to Drive — shared by single-click and bulk "File all"
            const uploadOne = async (it) => {
                if (!it || !it.edits.folderId || !it.edits.filename) return;
                updateItem(it.id, { status: 'uploading' });
                try {
                    const targetFolderId = testMode && TEST_PARENT_FOLDER_ID
                        ? TEST_PARENT_FOLDER_ID
                        : it.edits.folderId;
                    const filename = testMode ? `[TEST] ${it.edits.filename}` : it.edits.filename;
                    const uploaded = await drive.uploadNew(token, it.file, filename, targetFolderId);
                    updateItem(it.id, {
                        status: 'done',
                        edits: { ...it.edits, filename },
                        webViewLink: uploaded.webViewLink,
                    });
                    // Record for future duplicate detection
                    if (it.contentHash) {
                        const folder = folderIndexRef.current?.folders?.find(f => f.id === it.edits.folderId);
                        recentUploads.add({
                            hash: it.contentHash,
                            filename,
                            folderId: it.edits.folderId,
                            folderPath: displayPath(folder?.path || ''),
                            webViewLink: uploaded.webViewLink || '',
                            when: Date.now(),
                        });
                    }
                } catch (e) {
                    updateItem(it.id, { status: 'error', error: 'Upload failed: ' + e.message });
                }
            };

            const handleConfirm = async (id) => {
                const it = items.find(x => x.id === id);
                if (it) await uploadOne(it);
            };

            // User chose to file a flagged duplicate anyway — re-queue processing, skip dupe check
            const handleFileAnyway = (id) => {
                const it = items.find(x => x.id === id);
                if (!it) return;
                updateItem(id, { status: 'waiting', waitingReason: 'Queued (filing anyway)…', dupeOf: null });
                geminiQueueRef.current = geminiQueueRef.current.then(async () => {
                    await runGeminiForItem(id, it.file, { skipDupeCheck: true });
                    await new Promise(r => setTimeout(r, GEMINI_INTERVAL_MS));
                });
            };

            // Bulk file all ready items, sequentially (so Drive doesn't get hammered)
            const [bulkUploading, setBulkUploading] = useState(false);
            const handleConfirmAll = async () => {
                setBulkUploading(true);
                try {
                    const snapshot = items.filter(x =>
                        x.status === 'ready' && x.edits.folderId && x.edits.filename
                    );
                    for (const it of snapshot) {
                        await uploadOne(it);
                    }
                } finally {
                    setBulkUploading(false);
                }
            };

            const handleSkip = (id) => {
                setItems(prev => prev.filter(x => x.id !== id));
            };

            const handleChange = (id, edits) => updateItem(id, { edits });

            const clearDone = () => setItems(prev => prev.filter(x => x.status !== 'done'));
            const doneCount = items.filter(x => x.status === 'done').length;

            return (
                <div className="p-4 pb-8 relative">
                    <button
                        onClick={() => fileInputRef.current?.click()}
                        className="w-full border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center hover:border-slate-400 hover:bg-white transition"
                    >
                        <div className="text-4xl mb-2">📤</div>
                        <div className="text-sm font-medium text-slate-700 mb-1">Drop files or tap to choose</div>
                        <div className="text-xs text-slate-500">PDFs, images, or anything else</div>
                    </button>
                    <input
                        ref={fileInputRef}
                        type="file"
                        multiple
                        onChange={(e) => { onFilesSelected(e.target.files); e.target.value = ''; }}
                        className="hidden"
                    />

                    {items.length > 0 && (
                        <div className="mt-6 space-y-3 pb-24">
                            <div className="flex items-center justify-between">
                                <h3 className="text-sm font-semibold text-slate-700">
                                    {items.length} file{items.length === 1 ? '' : 's'}
                                </h3>
                                {doneCount > 0 && (
                                    <button onClick={clearDone} className="text-xs text-slate-500 underline">
                                        Clear {doneCount} filed
                                    </button>
                                )}
                            </div>
                            {items.map(it => (
                                <ReviewCard
                                    key={it.id}
                                    item={it}
                                    folderIndex={folderIndex}
                                    onChange={handleChange}
                                    onConfirm={handleConfirm}
                                    onSkip={handleSkip}
                                    onRetry={retryItem}
                                    onFileAnyway={handleFileAnyway}
                                />
                            ))}
                        </div>
                    )}

                    {/* Sticky "File all" action bar — appears when 2+ items are ready */}
                    {(() => {
                        const readyItems = items.filter(x => x.status === 'ready' && x.edits.folderId && x.edits.filename);
                        if (readyItems.length < 2) return null;
                        return (
                            <div className="fixed bottom-16 md:bottom-4 inset-x-0 z-30 px-4 pointer-events-none">
                                <div className="max-w-2xl mx-auto pointer-events-auto">
                                    <button
                                        onClick={handleConfirmAll}
                                        disabled={bulkUploading}
                                        className="w-full bg-slate-900 text-white rounded-xl py-3 font-semibold shadow-2xl active:scale-[0.99] disabled:opacity-60 flex items-center justify-center gap-2"
                                    >
                                        {bulkUploading ? (
                                            <><Spinner size={16}/> Filing {readyItems.length}…</>
                                        ) : (
                                            <>File all {readyItems.length}</>
                                        )}
                                    </button>
                                </div>
                            </div>
                        );
                    })()}

                    {!apiKey && items.length === 0 && (
                        <div className="mt-8 text-center text-xs text-slate-500 bg-slate-50 border border-slate-200 rounded-xl p-3">
                            Running in pattern-match mode. Add a Gemini key in Settings for AI-assisted naming (optional).
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // InboxTab — files in "📥 Pending Review" from email intake
        // ============================================================
        const InboxTab = ({ token, folderIndex, apiKey, testMode }) => {
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(false);
            const [intakeFolderId, setIntakeFolderId] = useState(null);
            const [error, setError] = useState(null);

            const findIntakeFolder = async () => {
                // Search Drive for the intake folder by name
                const params = new URLSearchParams({
                    q: `name = '${INTAKE_FOLDER_NAME.replace(/'/g, "\\'")}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false`,
                    fields: 'files(id,name)',
                });
                const resp = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
                    headers: { Authorization: `Bearer ${token}` },
                });
                if (!resp.ok) throw new Error(`Drive search failed: ${resp.status}`);
                const data = await resp.json();
                return data.files?.[0]?.id || null;
            };

            const load = useCallback(async () => {
                setLoading(true);
                setError(null);
                try {
                    let folderId = intakeFolderId;
                    if (!folderId) {
                        folderId = await findIntakeFolder();
                        setIntakeFolderId(folderId);
                    }
                    if (!folderId) {
                        setItems([]);
                        setError(`No "${INTAKE_FOLDER_NAME}" folder found. Once the Apps Script runs once it'll be created automatically.`);
                        return;
                    }
                    const data = await drive.listChildren(token, folderId);
                    const files = (data.files || []).filter(f => f.mimeType !== 'application/vnd.google-apps.folder');
                    // Convert to item shape with empty proposal — user needs to process each
                    setItems(files.map(f => ({
                        id: f.id,
                        driveId: f.id,
                        originalName: f.name,
                        mimeType: f.mimeType,
                        status: 'pending',
                        proposal: null,
                        edits: { folderId: '', filename: '' },
                        error: null,
                        webViewLink: null,
                    })));
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            }, [token, intakeFolderId]);

            useEffect(() => { load(); /* eslint-disable-next-line */ }, [token]);

            const processItem = async (itemId) => {
                const it = items.find(x => x.id === itemId);
                if (!it) return;
                if (!apiKey) { alert('Add a Gemini API key in Settings first.'); return; }
                setItems(prev => prev.map(x => x.id === itemId ? { ...x, status: 'processing' } : x));
                try {
                    const blob = await drive.download(token, it.driveId);
                    const file = new File([blob], it.originalName, { type: it.mimeType });
                    const payload = await prepareFileForNaming(file);
                    const proposal = await callGemini(apiKey, payload, folderIndex, it.originalName);
                    const folder = folderIndex.folders.find(f => displayPath(f.path) === proposal.folder_path || f.path === proposal.folder_path);
                    setItems(prev => prev.map(x => x.id === itemId ? {
                        ...x,
                        status: 'ready',
                        proposal,
                        edits: {
                            folderId: folder?.id || folderIndex.folders[0]?.id || '',
                            filename: proposal.filename || x.originalName,
                        },
                    } : x));
                } catch (e) {
                    setItems(prev => prev.map(x => x.id === itemId ? { ...x, status: 'error', error: e.message } : x));
                }
            };

            const processAll = () => {
                items.filter(i => i.status === 'pending').forEach(i => processItem(i.id));
            };

            const handleConfirm = async (itemId) => {
                const it = items.find(x => x.id === itemId);
                if (!it) return;
                setItems(prev => prev.map(x => x.id === itemId ? { ...x, status: 'uploading' } : x));
                try {
                    const targetFolderId = testMode && TEST_PARENT_FOLDER_ID ? TEST_PARENT_FOLDER_ID : it.edits.folderId;
                    const filename = testMode ? `[TEST] ${it.edits.filename}` : it.edits.filename;
                    // Move (change parent) + rename, since file is already in Drive
                    const updated = await drive.renameAndMove(
                        token, it.driveId, filename, targetFolderId, [intakeFolderId]
                    );
                    setItems(prev => prev.map(x => x.id === itemId ? {
                        ...x,
                        status: 'done',
                        edits: { ...x.edits, filename },
                        webViewLink: updated.webViewLink,
                    } : x));
                } catch (e) {
                    setItems(prev => prev.map(x => x.id === itemId ? { ...x, status: 'error', error: 'Move failed: ' + e.message } : x));
                }
            };

            const handleSkip = (itemId) => {
                setItems(prev => prev.filter(x => x.id !== itemId));
            };

            const handleChange = (itemId, edits) => {
                setItems(prev => prev.map(x => x.id === itemId ? { ...x, edits } : x));
            };

            const pendingCount = items.filter(x => x.status === 'pending').length;

            return (
                <div className="p-4 pb-8">
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="text-sm font-semibold text-slate-700">
                            📥 Pending Review {items.length > 0 ? `(${items.length})` : ''}
                        </h3>
                        <div className="flex gap-2">
                            {pendingCount > 1 && (
                                <button
                                    onClick={processAll}
                                    className="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-xs font-medium active:scale-[0.98]"
                                >
                                    Analyze all ({pendingCount})
                                </button>
                            )}
                            <button
                                onClick={load}
                                className="px-3 py-1.5 bg-slate-100 text-slate-700 rounded-lg text-xs font-medium active:scale-[0.98]"
                            >
                                {loading ? <Spinner size={12}/> : 'Refresh'}
                            </button>
                        </div>
                    </div>

                    {loading && items.length === 0 && (
                        <div className="text-center py-8 text-slate-400">
                            <Spinner size={20} className="mx-auto" />
                        </div>
                    )}

                    {error && (
                        <div className="text-sm text-slate-600 bg-slate-100 rounded-xl p-4">
                            {error}
                        </div>
                    )}

                    {!loading && !error && items.length === 0 && (
                        <div className="text-center py-12 text-slate-500">
                            <div className="text-4xl mb-2">📭</div>
                            <p className="text-sm">Nothing waiting. Forward a file to the intake inbox to add one.</p>
                        </div>
                    )}

                    <div className="space-y-3">
                        {items.map(it => (
                            <div key={it.id}>
                                {it.status === 'pending' ? (
                                    <div className="bg-white rounded-2xl border border-slate-200 p-4 flex items-center justify-between gap-3 fade-in">
                                        <div className="min-w-0 flex-1">
                                            <div className="text-sm font-medium text-slate-700 truncate">{it.originalName}</div>
                                            <div className="text-xs text-slate-400 mt-0.5">From email intake</div>
                                        </div>
                                        <button
                                            onClick={() => processItem(it.id)}
                                            className="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-xs font-medium active:scale-[0.98]"
                                        >
                                            Analyze
                                        </button>
                                        <button
                                            onClick={() => handleSkip(it.id)}
                                            className="text-xs text-slate-400 underline"
                                        >
                                            Skip
                                        </button>
                                    </div>
                                ) : (
                                    <ReviewCard
                                        item={it}
                                        folderIndex={folderIndex}
                                        onChange={handleChange}
                                        onConfirm={handleConfirm}
                                        onSkip={handleSkip}
                                    />
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const SettingsTab = ({ user, apiKey, setApiKey, testMode, setTestMode, refreshIndex, indexStatus, signOut, regrant }) => {
            const [keyInput, setKeyInput] = useState(apiKey || '');
            const [saved, setSaved] = useState(false);

            const saveKey = () => {
                const trimmed = keyInput.trim();
                if (trimmed) {
                    storage.set(STORAGE_KEYS.geminiKey, trimmed);
                    setApiKey(trimmed);
                    setSaved(true);
                    setTimeout(() => setSaved(false), 1500);
                }
            };

            const clearKey = () => {
                storage.del(STORAGE_KEYS.geminiKey);
                setApiKey('');
                setKeyInput('');
            };

            return (
                <div className="p-4 max-w-2xl mx-auto space-y-6">
                    <section className="bg-white rounded-2xl p-5 border border-slate-200">
                        <h3 className="font-semibold mb-1">Gemini API Key <span className="text-slate-400 font-normal text-xs">(optional)</span></h3>
                        <p className="text-xs text-slate-500 mb-3">
                            The app works without one using local pattern matching. Adding a key enables AI-assisted naming. Generate at <a className="underline" href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">aistudio.google.com/app/apikey</a>. Stored in this browser only.
                        </p>
                        <div className="flex gap-2">
                            <input
                                type="password"
                                value={keyInput}
                                onChange={e => setKeyInput(e.target.value)}
                                placeholder="AIza..."
                                className="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400"
                            />
                            <button
                                onClick={saveKey}
                                className="px-4 py-2 bg-slate-900 text-white rounded-lg text-sm font-medium active:scale-[0.98]"
                            >
                                {saved ? '✓' : 'Save'}
                            </button>
                        </div>
                        {apiKey && (
                            <button onClick={clearKey} className="mt-2 text-xs text-slate-500 underline">Clear saved key</button>
                        )}
                    </section>

                    <section className="bg-white rounded-2xl p-5 border border-slate-200">
                        <div className="flex items-center justify-between">
                            <div>
                                <h3 className="font-semibold">Test mode</h3>
                                <p className="text-xs text-slate-500 mt-1">Routes uploads to [DUPE FOR TESTING] folders instead of real ones.</p>
                            </div>
                            <button
                                onClick={() => setTestMode(!testMode)}
                                className={`relative w-12 h-7 rounded-full transition ${testMode ? 'bg-amber-500' : 'bg-slate-200'}`}
                            >
                                <span className={`absolute top-0.5 w-6 h-6 bg-white rounded-full transition ${testMode ? 'left-[22px]' : 'left-0.5'}`} />
                            </button>
                        </div>
                    </section>

                    <section className="bg-white rounded-2xl p-5 border border-slate-200">
                        <div className="flex items-center justify-between">
                            <div>
                                <h3 className="font-semibold">Folder index</h3>
                                <p className="text-xs text-slate-500 mt-1">{indexStatus || 'Not loaded.'}</p>
                            </div>
                            <button
                                onClick={() => refreshIndex({ force: true })}
                                className="px-3 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium active:scale-[0.98]"
                            >
                                Refresh
                            </button>
                        </div>
                    </section>

                    <section className="bg-white rounded-2xl p-5 border border-slate-200">
                        <h3 className="font-semibold mb-3">Account</h3>
                        <div className="text-sm text-slate-600 mb-3">{user.email}</div>
                        <div className="flex gap-2 flex-wrap">
                            <button
                                onClick={signOut}
                                className="px-3 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium active:scale-[0.98]"
                            >
                                Sign out
                            </button>
                            <button
                                onClick={regrant}
                                className="px-3 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium active:scale-[0.98]"
                            >
                                Re-grant Drive access
                            </button>
                        </div>
                        <p className="text-xs text-slate-400 mt-3">
                            Use Re-grant if you changed OAuth scopes or see 403 errors on uploads.
                        </p>
                    </section>

                    <div className="text-center text-xs text-slate-400 pt-4">{APP_VERSION}</div>
                </div>
            );
        };

        // ============================================================
        // APP
        // ============================================================
        const App = () => {
            const { user, token, loading, error, signIn, signOut, refreshToken } = useAuth();
            const [activeTab, setActiveTab] = useState(storage.get(STORAGE_KEYS.activeTab, 'upload'));
            const [apiKey, setApiKey] = useState(storage.get(STORAGE_KEYS.geminiKey, ''));
            const [testMode, setTestModeState] = useState(storage.get(STORAGE_KEYS.testMode) === 'true');
            // Hydrate from v2 cache; fall back to legacy v1 cache (old " / " format) so
            // we can still serve stale data while a fresh v2 walk runs in the background.
            const [folderIndex, setFolderIndex] = useState(() => {
                const v2 = storage.getJSON(STORAGE_KEYS.folderIndex);
                if (v2 && v2.folders?.length) return v2;
                // Migrate v1 in-memory (don't overwrite v2 storage — walk will do that)
                const v1 = storage.getJSON('bospage_folder_index');
                if (v1 && v1.folders?.length) {
                    return {
                        ...v1,
                        folders: v1.folders.map(f => ({
                            ...f,
                            path: (f.path || '').split(' / ').join(PATH_SEP),
                        })),
                        _migratedFromV1: true,
                    };
                }
                return null;
            });
            const [indexStatus, setIndexStatus] = useState('');
            const [globalDragging, setGlobalDragging] = useState(false);
            const dragCounter = useRef(0);

            useEffect(() => { storage.set(STORAGE_KEYS.activeTab, activeTab); }, [activeTab]);

            // Page-wide drag-and-drop. Files dropped anywhere → switch to Upload tab + dispatch to UploadTab.
            useEffect(() => {
                if (!user || !token) return; // no point dragging until signed in
                const onDragEnter = (e) => {
                    e.preventDefault();
                    // Only show overlay for FILE drags (not text/element drags)
                    if (e.dataTransfer?.types?.includes('Files')) {
                        dragCounter.current++;
                        setGlobalDragging(true);
                    }
                };
                const onDragLeave = (e) => {
                    e.preventDefault();
                    dragCounter.current--;
                    if (dragCounter.current <= 0) {
                        dragCounter.current = 0;
                        setGlobalDragging(false);
                    }
                };
                const onDragOver = (e) => { e.preventDefault(); };
                const onDrop = (e) => {
                    e.preventDefault();
                    setGlobalDragging(false);
                    dragCounter.current = 0;
                    if (e.dataTransfer?.files?.length) {
                        const files = Array.from(e.dataTransfer.files);
                        setActiveTab('upload');
                        window.dispatchEvent(new CustomEvent('bospage:files', { detail: files }));
                    }
                };
                window.addEventListener('dragenter', onDragEnter);
                window.addEventListener('dragleave', onDragLeave);
                window.addEventListener('dragover', onDragOver);
                window.addEventListener('drop', onDrop);
                return () => {
                    window.removeEventListener('dragenter', onDragEnter);
                    window.removeEventListener('dragleave', onDragLeave);
                    window.removeEventListener('dragover', onDragOver);
                    window.removeEventListener('drop', onDrop);
                };
            }, [user, token]);

            const setTestMode = (v) => {
                setTestModeState(v);
                storage.set(STORAGE_KEYS.testMode, String(v));
            };

            // Recursively walk the 8 root folders, collecting every subfolder's path
            // and up to MAX_EXAMPLES filenames per folder. Cached in localStorage.
            const refreshIndex = useCallback(async (opts = {}) => {
                if (!token) return;
                // Cross-tab lock — skip if another walk started in the last 3 min UNLESS the caller
                // explicitly forced a refresh (e.g. Settings → Refresh button).
                const LOCK_KEY = 'bospage_index_lock';
                const LOCK_TTL_MS = 3 * 60 * 1000;
                if (!opts.force) {
                    try {
                        const lockTs = parseInt(storage.get(LOCK_KEY, '0'), 10);
                        if (lockTs && Date.now() - lockTs < LOCK_TTL_MS) {
                            console.log('[Bos Page] Skipping index — another walk is in progress (started ' + Math.round((Date.now() - lockTs) / 1000) + 's ago)');
                            setIndexStatus('Indexing… (another tab is walking)');
                            return;
                        }
                    } catch {}
                }
                try { storage.set(LOCK_KEY, String(Date.now())); } catch {}
                const MAX_EXAMPLES_PER_FOLDER = 10;
                const FOLDER_MIME = 'application/vnd.google-apps.folder';
                const folders = []; // { id, name, path, rootId, files: [names] }
                const visited = new Set(); // folder IDs we've already walked — prevents duplicate walks
                const hashCandidates = []; // { hash, filename, folderId, folderPath, webViewLink, when }
                // Set of all designated root folder IDs — used to prevent one root's BFS
                // from "claiming" another root that happens to be reachable as its child
                // (Drive allows shared parents, so this can happen).
                const rootIdSet = new Set(ROOT_FOLDER_IDS);
                let folderCount = 0;
                let fileCount = 0;

                setIndexStatus('Starting index…');

                // Fetch all children of a folder, paginating
                const getAllChildren = async (folderId) => {
                    let all = [];
                    let pageToken = undefined;
                    do {
                        const data = await drive.listChildren(token, folderId, pageToken);
                        all = all.concat(data.files || []);
                        pageToken = data.nextPageToken;
                    } while (pageToken);
                    return all;
                };

                // BFS from a root folder
                const walkRoot = async (rootId) => {
                    let rootMeta;
                    try {
                        rootMeta = await drive.getMeta(token, rootId);
                    } catch (e) {
                        console.warn(`[Bos Page] Root ${rootId} failed to fetch:`, e.message);
                        return;
                    }
                    console.log(`[Bos Page] Walking root: ${rootMeta.name} (${rootMeta.id})`);
                    if (visited.has(rootMeta.id)) {
                        console.warn(`[Bos Page] Root "${rootMeta.name}" already visited — likely reachable from another root`);
                        return;
                    }
                    const queue = [{ id: rootMeta.id, name: rootMeta.name, path: rootMeta.name, rootId: rootMeta.id }];
                    while (queue.length) {
                        const cur = queue.shift();
                        if (visited.has(cur.id)) continue; // dedup: folder might be shared across multiple parents
                        visited.add(cur.id);
                        let children;
                        try {
                            children = await getAllChildren(cur.id);
                        } catch (e) {
                            console.warn('Failed to list', cur.path, e);
                            continue;
                        }
                        const fileNames = [];
                        for (const c of children) {
                            if (c.mimeType === FOLDER_MIME) {
                                // Skip designated roots — they'll be walked by their own walkRoot call,
                                // giving them their own root-level path instead of inheriting this parent's.
                                if (!visited.has(c.id) && !rootIdSet.has(c.id)) {
                                    queue.push({
                                        id: c.id,
                                        name: c.name,
                                        path: `${cur.path}${PATH_SEP}${c.name}`,
                                        rootId: cur.rootId,
                                    });
                                }
                            } else {
                                fileNames.push(c.name);
                                fileCount++;
                                // Capture hash for dupe detection if Drive provided one
                                if (c.sha256Checksum) {
                                    hashCandidates.push({
                                        hash: c.sha256Checksum,
                                        filename: c.name,
                                        folderId: cur.id,
                                        folderPath: displayPath(cur.path),
                                        webViewLink: c.webViewLink || '',
                                        when: c.modifiedTime ? new Date(c.modifiedTime).getTime() : 0,
                                    });
                                }
                            }
                        }
                        // Keep a cap per-folder so the LLM context doesn't blow up
                        const examples = fileNames.slice(-MAX_EXAMPLES_PER_FOLDER);
                        folders.push({
                            id: cur.id,
                            name: cur.name,
                            path: cur.path,
                            rootId: cur.rootId,
                            files: examples,
                        });
                        folderCount++;
                        setIndexStatus(`Indexing… ${folderCount} folders, ${fileCount} files`);
                    }
                    // After each root completes, snapshot progress so a page refresh mid-walk
                    // doesn't lose everything. Timestamp uses old value so the useEffect still
                    // treats it as "stale" and re-walks on next load — but at least we have data.
                    try {
                        storage.setJSON(STORAGE_KEYS.folderIndex, { folders: [...folders], indexedAt: Date.now(), partial: true });
                    } catch {}
                };

                try {
                    // Roots in parallel, BFS within each root is sequential to respect rate limits
                    await Promise.all(ROOT_FOLDER_IDS.map(walkRoot));
                    const idx = { folders, indexedAt: Date.now() };
                    setFolderIndex(idx);
                    try {
                        storage.setJSON(STORAGE_KEYS.folderIndex, idx);
                        storage.set(STORAGE_KEYS.folderIndexTs, String(Date.now()));
                    } catch (e) {
                        // If localStorage overflows (big index), keep in-memory only
                        console.warn('Index too big to cache, keeping in memory only', e);
                    }
                    // Build/save Drive hash index — sorted by recency, top 5000 only
                    try {
                        hashCandidates.sort((a, b) => (b.when || 0) - (a.when || 0));
                        const top = hashCandidates.slice(0, DRIVE_HASH_INDEX_LIMIT);
                        const map = {};
                        for (const h of top) map[h.hash] = h;
                        driveHashIndex.save(map);
                        console.log(`[Bos Page] Drive hash index: ${top.length} entries (from ${hashCandidates.length} hashed files)`);
                    } catch (e) {
                        console.warn('Could not save Drive hash index:', e);
                    }
                    setIndexStatus(`${folderCount} folders · ${fileCount} files · just now`);
                } catch (e) {
                    setIndexStatus('Index failed: ' + e.message);
                } finally {
                    // Release the cross-tab lock so future walks can start
                    try { storage.del('bospage_index_lock'); } catch {}
                }
            }, [token]);

            // Stale-while-revalidate: on token acquisition, show cached index immediately
            // and kick off a background refresh only when cache is missing OR older than 24h.
            // During refresh, folderIndex keeps serving current value — files can still process.
            useEffect(() => {
                if (!token) return;
                const ts = parseInt(storage.get(STORAGE_KEYS.folderIndexTs, '0'), 10);
                const needsFullFill = !folderIndex || folderIndex._migratedFromV1 || folderIndex.partial;
                const isStale = Date.now() - ts > INDEX_TTL_MS;
                if (needsFullFill || isStale) {
                    // Fire background refresh; existing folderIndex state remains valid meanwhile
                    refreshIndex();
                } else {
                    const fileCount = (folderIndex.folders || []).reduce((s, f) => s + (f.files?.length || 0), 0);
                    const age = Math.round((Date.now() - ts) / 60000);
                    setIndexStatus(`${folderIndex.folders?.length || 0} folders · ${fileCount} files · ${age}m ago`);
                }
            }, [token]);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <Spinner size={28} className="text-slate-400" />
                    </div>
                );
            }

            if (!user) {
                return <SignInScreen onSignIn={signIn} error={error} />;
            }

            // Signed in but no Drive token — happens after cache clear / first-time
            if (!token) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="max-w-sm w-full text-center fade-in">
                            <div className="text-5xl mb-4">🔑</div>
                            <p className="text-sm text-slate-600 mb-6">Need to grant Drive access to continue.</p>
                            <button
                                onClick={refreshToken}
                                className="w-full bg-slate-900 text-white rounded-xl px-4 py-3 font-medium active:scale-[0.98] transition"
                            >
                                Grant access
                            </button>
                            {error && (
                                <div className="mt-4 text-sm text-red-600 bg-red-50 border border-red-100 rounded-lg p-3 text-left">
                                    {error}
                                </div>
                            )}
                            <button
                                onClick={signOut}
                                className="mt-3 text-xs text-slate-500 underline"
                            >
                                Sign out
                            </button>
                        </div>
                    </div>
                );
            }

            const tabProps = { token, folderIndex, refreshIndex, apiKey, testMode };

            return (
                <div className="min-h-screen pb-20 md:pb-4">
                    <Header user={user} testMode={testMode} indexStatus={indexStatus} />
                    <main className="max-w-2xl mx-auto">
                        {activeTab === 'upload' && <UploadTab {...tabProps} />}
                        {activeTab === 'inbox' && <InboxTab {...tabProps} />}
                        {activeTab === 'settings' && (
                            <SettingsTab
                                user={user}
                                apiKey={apiKey}
                                setApiKey={setApiKey}
                                testMode={testMode}
                                setTestMode={setTestMode}
                                refreshIndex={refreshIndex}
                                indexStatus={indexStatus}
                                signOut={signOut}
                                regrant={refreshToken}
                            />
                        )}
                    </main>
                    <TabBar activeTab={activeTab} setActiveTab={setActiveTab} />
                    {globalDragging && (
                        <div className="fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-[100] flex items-center justify-center pointer-events-none">
                            <div className="bg-white rounded-3xl px-12 py-10 shadow-2xl border-4 border-dashed border-slate-900 max-w-md mx-4 text-center">
                                <div className="text-6xl mb-3">📥</div>
                                <div className="text-2xl font-semibold">Drop to file</div>
                                <div className="text-sm text-slate-500 mt-2">Anywhere on the page</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
