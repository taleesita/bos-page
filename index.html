<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script>
        // Global error handler — catches Babel compile + runtime errors that would leave a blank page
        window.onerror = function(msg, url, line, col, error) {
            var root = document.getElementById('root');
            if (root && !root.innerHTML.trim()) {
                root.innerHTML = '<div style="padding:32px;font-family:system-ui;max-width:640px;margin:0 auto;">' +
                    '<h2 style="color:#dc2626;margin:0 0 12px;">Something went wrong</h2>' +
                    '<p style="color:#666;margin:0 0 16px;">The app failed to load. Details:</p>' +
                    '<pre style="background:#fef2f2;padding:16px;border-radius:8px;overflow:auto;font-size:13px;color:#991b1b;white-space:pre-wrap;">' +
                    msg + (line ? '\nLine: ' + line : '') + (col ? ', Col: ' + col : '') +
                    (error && error.stack ? '\n\n' + error.stack : '') + '</pre>' +
                    '<p style="color:#666;font-size:14px;margin-top:16px;">Try refreshing or clearing cache.</p></div>';
            }
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ============================================================
        // CONSTANTS
        // ============================================================
        const APP_VERSION = 'v3.14-apr26 force-refresh';

        // OAuth 2.0 Web Client ID from Google Cloud Console (auto-created by Firebase).
        // Used by Google Identity Services (GIS) TokenClient for Drive access tokens.
        const GOOGLE_CLIENT_ID = '388095163990-bs2mtkv57v3htag3c1n3l1kd0mool42n.apps.googleusercontent.com';

        const ALLOWED_EMAILS = ['taly.matiteyahu@gmail.com', 'doug.pickard@gmail.com'];
        const EMAIL_TO_NAME = {
            'taly.matiteyahu@gmail.com': 'Taly',
            'doug.pickard@gmail.com': 'Doug',
        };

        // The 8 top-level folders the app files into. Names are fetched from Drive on first load.
        const ROOT_FOLDER_IDS = [
            '1SrKvsj4kPzgiPVMbNLyYXAdR6zSHrnvf',
            '1CvbXymJEZ6WFmwQy8laNYGf2oJeoXHjx',
            '1masK55Ba7iCJt4BSsi768rw1V79jWA6G',
            '1jBDesN7gZR44lXks7FBnZvY7xrj-gerB',
            '1ZKB55vwayUPaYakyF8VHMNi9LXv6KnHo',
            '1xGJwcmTEKcIFbbsfQ4_IJM5OCeX_EQfI',
            '1YT5ITO7OzZSt2zjMWyeE-r73gRBaqCI3',
            '1T-vFM3IHKFGtC2Sv_fc0kO4J2-DcfnPz',
        ];

        // Name of the Drive folder that the Apps Script drops email attachments into
        const INTAKE_FOLDER_NAME = '📥 Pending Review';

        // Internal path separator. Folder names like "- Account / Expenses" contain " / ",
        // so we use a sentinel character that can't appear in Drive folder names instead.
        // Display: convert back to " / " via displayPath().
        const PATH_SEP = '\u0001';
        const displayPath = (p) => (p || '').split(PATH_SEP).join(' / ');

        // Parent used for [DUPE FOR TESTING] folders — same convention as expense tracker
        // TODO: set to a real Drive folder ID after first-run test-mode setup
        const TEST_PARENT_FOLDER_ID = '';

        // Scopes needed from Google. drive = full Drive so we can rename + move into shared folders.
        const GOOGLE_SCOPES = ['https://www.googleapis.com/auth/drive'];

        const INDEX_TTL_MS = 24 * 60 * 60 * 1000; // 24h folder-index cache

        // ============================================================
        // STORAGE HELPERS (localStorage wrappers with try/catch)
        // ============================================================
        const storage = {
            get: (k, fallback = null) => {
                try { const v = localStorage.getItem(k); return v == null ? fallback : v; } catch { return fallback; }
            },
            set: (k, v) => { try { localStorage.setItem(k, v); } catch {} },
            getJSON: (k, fallback = null) => {
                try { const v = localStorage.getItem(k); return v == null ? fallback : JSON.parse(v); } catch { return fallback; }
            },
            setJSON: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
            del: (k) => { try { localStorage.removeItem(k); } catch {} },
        };

        const STORAGE_KEYS = {
            geminiKey: 'bospage_gemini_key',
            testMode: 'bospage_test_mode',
            accessToken: 'bospage_google_access_token',
            accessTokenExpiry: 'bospage_google_access_token_expiry',
            folderIndex: 'bospage_folder_index_v2',     // v2 uses new internal PATH_SEP format
            folderIndexTs: 'bospage_folder_index_ts_v2',
            activeTab: 'bospage_active_tab',
            userEmail: 'bospage_user_email',
            userName: 'bospage_user_name',
            recentUploads: 'bospage_recent_uploads',
        };

        // Recent-upload tracking for duplicate detection.
        // Records {hash, filename, folderPath, folderId, webViewLink, when} per successful file.
        // Keeps last RECENT_UPLOADS_LIMIT entries so we can detect identical files coming back.
        const RECENT_UPLOADS_LIMIT = 1000;

        const computeFileHash = async (file) => {
            if (!crypto?.subtle?.digest) return null;
            const buf = await file.arrayBuffer();
            const hash = await crypto.subtle.digest('SHA-256', buf);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        };

        const recentUploads = {
            list: () => storage.getJSON(STORAGE_KEYS.recentUploads, []),
            find: (hash) => {
                if (!hash) return null;
                return recentUploads.list().find(x => x.hash === hash) || null;
            },
            add: (entry) => {
                const list = recentUploads.list();
                list.unshift(entry);
                if (list.length > RECENT_UPLOADS_LIMIT) list.length = RECENT_UPLOADS_LIMIT;
                storage.setJSON(STORAGE_KEYS.recentUploads, list);
            },
        };

        // Drive-wide hash index — populated during refreshIndex by reading sha256Checksum
        // from existing Drive files. Covers files filed BEFORE the dupe detector existed.
        // Capped at 5000 most-recently-modified files to fit in localStorage.
        const DRIVE_HASH_INDEX_LIMIT = 5000;
        const DRIVE_HASH_INDEX_KEY = 'bospage_drive_hash_index';
        const driveHashIndex = {
            map: () => storage.getJSON(DRIVE_HASH_INDEX_KEY, {}),
            find: (hash) => {
                if (!hash) return null;
                return driveHashIndex.map()[hash] || null;
            },
            save: (mapObj) => storage.setJSON(DRIVE_HASH_INDEX_KEY, mapObj),
        };

        // Combined lookup — check both sources
        const findDuplicate = (hash) => recentUploads.find(hash) || driveHashIndex.find(hash);

        // ============================================================
        // GOOGLE DRIVE API WRAPPERS
        // ============================================================
        const drive = {
            // List children of a folder (supports pagination)
            listChildren: async (token, folderId, pageToken) => {
                const params = new URLSearchParams({
                    q: `'${folderId}' in parents and trashed = false`,
                    fields: 'nextPageToken, files(id, name, mimeType, modifiedTime, webViewLink, sha256Checksum)',
                    pageSize: '1000',
                    orderBy: 'name',
                });
                if (pageToken) params.set('pageToken', pageToken);
                const resp = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (!resp.ok) throw new Error(`Drive list failed: ${resp.status}`);
                return resp.json();
            },
            // Fetch a single file/folder's metadata
            getMeta: async (token, fileId) => {
                const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?fields=id,name,mimeType,parents,webViewLink`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (!resp.ok) throw new Error(`Drive get failed: ${resp.status}`);
                return resp.json();
            },
            // Upload a new file (multipart) with name + parent
            uploadNew: async (token, file, name, parentId) => {
                const metadata = { name, parents: [parentId] };
                const boundary = 'foo_' + Math.random().toString(36).slice(2);
                const body = new Blob([
                    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n`,
                    JSON.stringify(metadata) + `\r\n--${boundary}\r\nContent-Type: ${file.type || 'application/octet-stream'}\r\n\r\n`,
                    file,
                    `\r\n--${boundary}--`
                ]);
                const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink', {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${token}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
                    body,
                });
                if (!resp.ok) throw new Error(`Drive upload failed: ${resp.status} ${await resp.text()}`);
                return resp.json();
            },
            // Rename + change parent of an existing file (used when filing email intake items)
            renameAndMove: async (token, fileId, newName, newParentId, oldParentIds) => {
                const params = new URLSearchParams({
                    addParents: newParentId,
                    removeParents: (oldParentIds || []).join(','),
                    fields: 'id,name,webViewLink',
                });
                const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?${params}`, {
                    method: 'PATCH',
                    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName }),
                });
                if (!resp.ok) throw new Error(`Drive patch failed: ${resp.status} ${await resp.text()}`);
                return resp.json();
            },
            // Create a subfolder under a parent
            createFolder: async (token, name, parentId) => {
                const resp = await fetch('https://www.googleapis.com/drive/v3/files?fields=id,name', {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] }),
                });
                if (!resp.ok) throw new Error(`Create folder failed: ${resp.status}`);
                return resp.json();
            },
            // Download a file's contents as a Blob
            download: async (token, fileId) => {
                const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (!resp.ok) throw new Error(`Download failed: ${resp.status}`);
                return resp.blob();
            },
        };

        // ============================================================
        // FILE PROCESSING — PDF text, Tesseract OCR, image data URLs
        // ============================================================
        const fileUtils = {
            readAsDataURL: (file) => new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = () => resolve(r.result);
                r.onerror = () => reject(r.error);
                r.readAsDataURL(file);
            }),
            readAsArrayBuffer: (file) => new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = () => resolve(r.result);
                r.onerror = () => reject(r.error);
                r.readAsArrayBuffer(file);
            }),
        };

        // Extract native text from a PDF (page 1 + 2 only, sufficient for naming)
        const extractPdfText = async (file) => {
            if (!window.pdfjsLib) return '';
            const buf = await fileUtils.readAsArrayBuffer(file);
            const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
            const pages = Math.min(pdf.numPages, 2);
            let text = '';
            for (let i = 1; i <= pages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(x => x.str).join(' ') + '\n';
            }
            return text.trim();
        };

        // Render all pages of a PDF to data URLs (capped), calling onProgress with
        // the array so far after each page — lets the UI update progressively.
        const pdfAllPagesToDataUrls = async (file, maxPages, onProgress) => {
            if (!window.pdfjsLib) return [];
            const buf = await fileUtils.readAsArrayBuffer(file);
            const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
            const count = Math.min(pdf.numPages, maxPages || 20);
            const urls = [];
            for (let i = 1; i <= count; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                urls.push(canvas.toDataURL('image/jpeg', 0.75));
                if (onProgress) onProgress(urls.slice());
            }
            return urls;
        };

        // Generate preview pages for a file. Returns array of data URLs (1 for images, N for PDFs).
        // Calls onProgress incrementally as PDF pages render so the first page shows fast.
        const generatePreviews = async (file, onProgress) => {
            try {
                const type = file.type || '';
                if (type.startsWith('image/')) {
                    const url = await fileUtils.readAsDataURL(file);
                    const all = [url];
                    if (onProgress) onProgress(all);
                    return all;
                }
                if (type === 'application/pdf' || /\.pdf$/i.test(file.name)) {
                    return await pdfAllPagesToDataUrls(file, 20, onProgress);
                }
            } catch (e) {
                console.warn('Preview generation failed:', e);
            }
            return [];
        };

        // Render PDF page 1 to a data URL for vision fallback
        const pdfFirstPageToDataUrl = async (file) => {
            if (!window.pdfjsLib) return null;
            const buf = await fileUtils.readAsArrayBuffer(file);
            const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 1.5 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            return canvas.toDataURL('image/jpeg', 0.7);
        };

        // Tesseract OCR — extract text from an image data URL.
        // Used when pdf.js has nothing (scanned PDFs) and we have no LLM to vision-OCR.
        const tesseractOcr = async (imageSource, onProgress) => {
            if (!window.Tesseract) return '';
            try {
                const { createWorker } = Tesseract;
                const worker = await createWorker('eng', undefined, {
                    logger: onProgress ? (m) => onProgress(m) : undefined,
                });
                const result = await worker.recognize(imageSource);
                await worker.terminate();
                return (result?.data?.text || '').trim();
            } catch (e) {
                console.warn('Tesseract OCR failed:', e);
                return '';
            }
        };

        // Decide what payload to send for naming a file.
        //   - useLocalMode = true: we have NO LLM. Always return TEXT (run OCR on scanned PDFs / images).
        //   - useLocalMode = false: prefer image payload for scanned PDFs (Gemini handles vision).
        const prepareFileForNaming = async (file, { useLocalMode = false, onOcrProgress = null } = {}) => {
            const type = file.type || '';
            if (type.startsWith('image/')) {
                if (useLocalMode) {
                    if (onOcrProgress) onOcrProgress({ status: 'ocr_start' });
                    const text = await tesseractOcr(file, onOcrProgress);
                    return { kind: 'text', text: text || `File name: ${file.name}`, textHint: file.name };
                }
                const dataUrl = await fileUtils.readAsDataURL(file);
                return { kind: 'image', mimeType: type, dataUrl, textHint: file.name };
            }
            if (type === 'application/pdf' || /\.pdf$/i.test(file.name)) {
                try {
                    const text = await extractPdfText(file);
                    if (text && text.length > 30) {
                        return { kind: 'text', text, textHint: file.name };
                    }
                    // pdf.js got nothing useful — fall back to image / OCR
                    if (useLocalMode) {
                        // OCR up to 3 pages at higher resolution (2x scale) so Tesseract has
                        // a better shot at stylized logos and gives us more text overall.
                        if (onOcrProgress) onOcrProgress({ status: 'ocr_start' });
                        const buf = await fileUtils.readAsArrayBuffer(file);
                        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
                        const numToOcr = Math.min(pdf.numPages, 3);
                        let combined = '';
                        for (let i = 1; i <= numToOcr; i++) {
                            const page = await pdf.getPage(i);
                            const viewport = page.getViewport({ scale: 2.0 });
                            const canvas = document.createElement('canvas');
                            canvas.width = viewport.width;
                            canvas.height = viewport.height;
                            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                            const pageText = await tesseractOcr(dataUrl, (m) => {
                                if (onOcrProgress) onOcrProgress({ ...m, page: i, totalPages: numToOcr });
                            });
                            combined += pageText + '\n\n';
                        }
                        return { kind: 'text', text: combined || `File name: ${file.name}`, textHint: file.name };
                    }
                    // Gemini mode — single page as image
                    const dataUrl = await pdfFirstPageToDataUrl(file);
                    if (dataUrl) {
                        return { kind: 'image', mimeType: 'image/jpeg', dataUrl, textHint: file.name };
                    }
                } catch (e) {
                    console.warn('PDF extract failed, falling back to filename only', e);
                }
            }
            return { kind: 'text', text: `File name: ${file.name}`, textHint: file.name };
        };

        // ============================================================
        // GEMINI API CLIENT
        // ============================================================
        const GEMINI_MODEL = 'gemini-2.0-flash';
        const GEMINI_ENDPOINT = (key) =>
            `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;

        // Build the folder-index summary that goes into the prompt.
        // Each folder gets its path + up to 3 example filenames.
        // Empty folders are skipped — they provide no naming-pattern signal and
        // bloat the prompt. Large indexes would blow past Gemini's free-tier token limits.
        const formatFolderIndex = (folders) => {
            const lines = [];
            for (const f of folders) {
                if (!f.files || !f.files.length) continue; // skip empty folders
                lines.push(`PATH: ${displayPath(f.path)} [id=${f.id}]`);
                const examples = f.files.slice(-3);
                for (const n of examples) lines.push(`  - ${n}`);
            }
            return lines.join('\n');
        };

        // Folders whose path contains any of these (case-insensitive substring) are EXCLUDED
        // from auto-matching. They stay in the cascading dropdown for manual selection, but
        // the ranker won't suggest them. These are archived / read-only buckets.
        // Folders to NEVER auto-route into — purely archival (school records, etc.)
        // CLEs / NYS Bar are NOT excluded here because Taly still adds real CLE docs.
        // Snack containers landing in CLE folders is handled by the new CLE semantic
        // category requiring actual CLE vocabulary in the doc.
        const EXCLUDED_PATH_PATTERNS = [
            'rvrhs',
            'nyu',
            'cls',
            'columbia law',
            'high school',
            'undergrad',
            'general assembly',
            'no longer relevant',   // archived past job apps
            'offers received',      // archived job offers
        ];

        const isFolderExcluded = (folder) => {
            const p = (folder?.path || '').toLowerCase();
            return EXCLUDED_PATH_PATTERNS.some(pat => p.includes(pat));
        };

        // Semantic categories: help the ranker understand that a document ABOUT baby items
        // belongs in a folder NAMED "Nutbear", even though those words never overlap directly.
        //
        // docKeywords = words that appear in the document (expanded matching)
        // folderKeywords = words in the folder PATH that indicate this is the destination
        //
        // Adjust / extend these as patterns emerge.
        const SEMANTIC_CATEGORIES = [
            {
                name: 'baby',
                docKeywords: ['baby','infant','toddler','newborn','nursery','crib','pacifier','formula','diaper','stroller','teething','breast pump','bottle warmer','swaddle','bassinet','highchair','onesie','carseat','car seat','pram','bib','bibs','sippy','breastmilk','frida baby','fridababy','thermometer','baby thermometer','muffy','baby muffy','alpine muffy','tiny twinkle','tinytwinkle','aveeno','aveeno kids','aveeno baby','cetaphil','pediatricians','dermatologists'],
                folderKeywords: ['nutbear','baby','kids','infant','children','nursery'],
            },
            {
                name: 'kitchen',
                docKeywords: ['blender','toaster','microwave','oven','cooktop','mixer','kitchenware','cookware','spatula','dishwasher','instant pot','sous vide','espresso','coffee maker','kettle','cast iron','nonstick','cutlery','knife set','food processor','saucepan','cutting board','ice cream maker','stock pot','dutch oven','die cast','die-cast','aluminum stock pot','pots and pans','pot lid','nutribullet','vitamix','kitchenaid','breville','keurig'],
                folderKeywords: ['kitchenware','kitchen','cookware'],
            },
            {
                name: 'furniture_housewares',
                docKeywords: ['vacuum cleaner','mattress','pillow','bedding','sheet','comforter','curtain','iron','humidifier','air purifier','fan','heater','lamp','lightbulb','vac seal','vacuum sealer','sofa','chair','table','desk','shelf','shelving','ottoman','nightstand','dresser','bookshelf','bed frame','rug','decor','picture frame','photo frame','wall hook','mounting bracket','floating shelf','hanging','frame backboard'],
                folderKeywords: ['furniture','housewares','home goods','household','bedroom','living'],
            },
            {
                name: 'outdoor_plants',
                docKeywords: ['camping','hiking','tent','sleeping bag','backpack','waterproof','fishing','kayak','ski','snowboard','garden','plant','planter','pot','hose','lawn','outdoor light','patio','grill','bbq','mower','leaf blower','outdoor storage'],
                folderKeywords: ['outdoor','plants','patio','garden'],
            },
            {
                name: 'gopro',
                docKeywords: ['gopro','go pro','action cam','action camera','dji osmo','dji action','insta360','helmet cam','floating hand grip','quick release mount'],
                folderKeywords: ['gopro','go pro','action cam'],
            },
            {
                name: 'electronics',
                docKeywords: ['charger','battery','headphone','earbud','speaker','router','modem','wifi','bluetooth','hdmi','usb','laptop','monitor','keyboard','mouse','smart home','thermostat','soundbar','tv stand','charging station','wireless charging','wireless charger','power bank','magnetic charger','3-in-1','dock','adapter','cable','airpods','snugluv'],
                folderKeywords: ['electronics','tech','gadget','audio','computer'],
            },
            {
                name: 'pet_dog',
                docKeywords: ['dog','puppy','canine','leash','collar','kennel','chew toy','harness','dog carrier','dog crate','dog food','dog treat'],
                folderKeywords: ['dog stuff','dog','canine'],
            },
            {
                name: 'pet_other',
                docKeywords: ['cat','feline','litter','aquarium','veterinary','vet visit','kitten'],
                folderKeywords: ['pet','cat','vet'],
            },
            {
                name: 'health',
                docKeywords: ['prescription','pharmacy','diagnosis','clinic','patient','dosage','medication','thermometer','blood pressure','medical'],
                folderKeywords: ['health','medical','pharmacy'],
            },
            {
                name: 'orders',
                docKeywords: ['amazon','amzn','ebay','order number','packing slip','marketplace','subtotal','shipping','sku','isbn','invoice number','tracking number','order date','shipped','seller','marketplace order'],
                folderKeywords: ['order processing','orders','receipts','invoices','shipping','packing'],
            },
            {
                // Boost "Product Manuals" parent folders when the doc looks like product packaging /
                // a manual. Works alongside specific categories (baby/kitchen/etc.) — both bonuses stack,
                // so a baby thermometer manual gets +100 (baby) + +100 (manual) = decisive.
                name: 'has_manual',
                docKeywords: [
                    'instruction manual','user manual',"owner's manual",'installation guide','user guide',
                    'setup guide','quick start guide','user booklet','warranty','model no','model number',
                    'serial number','manufactured by','distributed by','made in china','made in usa','made in',
                    'patent pending','rev.','operating manual','reference guide','recommended by','imported by',
                ],
                folderKeywords: ['product manuals','manuals'],
            },
            {
                name: 'cle',
                docKeywords: [
                    'cle credit','cle course','continuing legal education','mcle','cle hours',
                    'legal ethics','professional responsibility','attorney','esq.','esquire',
                    'bar association','bar admission','aba','american bar','nysba','new york state bar',
                    'panel discussion','symposium','jurisdiction','case law','jurisprudence',
                    'plaintiff','defendant','statute','precedent','litigation','course materials','panelist',
                ],
                folderKeywords: ['cle','nys bar','continuing legal','law journal','symposium','bar association'],
            },
        ];

        // Detect which semantic categories a document falls into, based on substring
        // match of docKeywords in the raw text (not just tokenized words, so multi-word
        // terms like "vacuum seal" match).
        const detectCategories = (docText) => {
            if (!docText) return [];
            const lower = docText.toLowerCase();
            return SEMANTIC_CATEGORIES.filter(cat =>
                cat.docKeywords.some(kw => lower.includes(kw))
            );
        };

        // Extract a likely document date from extracted text. Returns {year, month, day} or null.
        const extractDocDate = (text) => {
            if (!text) return null;
            // YYYY-MM-DD or YYYY/MM/DD or YYYY.MM.DD
            let m = text.match(/\b(20\d{2})[-\/.](0?[1-9]|1[0-2])[-\/.](0?[1-9]|[12]\d|3[01])\b/);
            if (m) return { year: m[1], month: m[2].padStart(2, '0'), day: m[3].padStart(2, '0') };
            // MM/DD/YYYY or MM.DD.YYYY or MM-DD-YYYY
            m = text.match(/\b(0?[1-9]|1[0-2])[\/.\-](0?[1-9]|[12]\d|3[01])[\/.\-](20\d{2})\b/);
            if (m) return { year: m[3], month: m[1].padStart(2, '0'), day: m[2].padStart(2, '0') };
            // Month DD, YYYY
            const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
            const mRegex = new RegExp(`\\b(${months.join('|')})\\s+(\\d{1,2}),?\\s+(20\\d{2})`, 'i');
            m = text.match(mRegex);
            if (m) {
                const mo = months.indexOf(m[1].toLowerCase()) + 1;
                return { year: m[3], month: String(mo).padStart(2, '0'), day: m[2].padStart(2, '0') };
            }
            // Month YYYY (no day) — "May 2026"
            const mRegex2 = new RegExp(`\\b(${months.join('|')})\\s+(20\\d{2})\\b`, 'i');
            m = text.match(mRegex2);
            if (m) {
                const mo = months.indexOf(m[1].toLowerCase()) + 1;
                return { year: m[2], month: String(mo).padStart(2, '0'), day: '01' };
            }
            return null;
        };

        // Guess a brand/company name and doc type from OCR text.
        // Case-insensitive: real brands include lowercase logos (frida baby, tiny twinkle, aveeno).
        // Requires 2+ mentions so we don't pick up one-off random words like "PURCHASE".
        const guessCompanyAndType = (text) => {
            if (!text) return { company: null, type: null };
            const head = text.slice(0, 5000);
            // Stop words (lowercase) — common packaging/manual words that aren't brands
            const stop = new Set([
                'the','this','that','these','those','your','yours','user','owner','model','serial','please','read',
                'before','after','for','and','but','or','with','without','thank','thanks','table','contents','chapter',
                'section','page','note','warning','caution','important','safety','address','email','phone','web',
                'website','made','new','used','item','product','description','customer','service','support',
                'manufacturer','from','date','dear','hello','step','setup','always','never','when','while','during',
                'recommended','enjoy','enjoyed','purchase','contains','include','features','ingredient','ingredients',
                'pack','box','set','count','net','wt','weight','volume','distributed','marketed','imported','exported',
                'free','natural','organic','pure','original','classic','premium','plus','pro','max','mini','com',
                'directions','warnings','keep','out','reach','children','use','only','consult','doctor','physician',
                'pediatricians','dermatologists','adults','kids','baby','adult','men','women','daily','weekly',
                'appreciate','company','manual','guide','instructions',
            ]);
            // 1–3 word phrases, any case, 3+ chars per word
            const counts = new Map();
            const re = /\b([a-zA-Z][a-zA-Z0-9]{2,}(?:\s+[a-zA-Z][a-zA-Z0-9]{2,}){0,2})\b/g;
            let m;
            while ((m = re.exec(head))) {
                const phrase = m[1].trim();
                const words = phrase.split(/\s+/);
                // Skip if any word is a stop word
                if (words.some(p => stop.has(p.toLowerCase()))) continue;
                // Skip single super-long words (chemical names, ingredient lists)
                if (words.length === 1 && words[0].length > 18) continue;
                // Use lowercase key so "Tiny Twinkle" and "tiny twinkle" tally together
                const key = phrase.toLowerCase();
                counts.set(key, (counts.get(key) || 0) + 1);
            }
            // Need at least 2 mentions; pick highest by frequency × length
            let companyKey = null, bestScore = 0;
            for (const [k, c] of counts) {
                if (c < 2) continue;
                const score = c * 10 + k.length;
                if (score > bestScore) { bestScore = score; companyKey = k; }
            }
            const titleCase = (s) => s.split(/\s+/).map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase()).join(' ');
            const company = companyKey ? titleCase(companyKey) : null;
            // Doc type detection
            let type = null;
            const typeMatch = head.match(/\b(instruction\s+manual|user\s+(?:manual|guide)|owner'?s\s+manual|installation\s+guide|quick\s+start(?:\s+guide)?|warranty|instructions?|reference\s+guide|setup\s+guide|user\s+booklet)\b/i);
            if (typeMatch) {
                type = typeMatch[1].replace(/\s+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            }
            return { company, type };
        };

        // Local (no-LLM) proposer: rank folders by keyword overlap, adapt filename pattern
        // from the folder's most recent existing filename by swapping in the doc's date.
        const proposeLocally = (folders, docText, originalFilename) => {
            // Compute top folder + its actual score so we know whether to trust the match
            const tokenize = (s) => (s || '').toLowerCase().match(/[a-z0-9]{3,}/g) || [];
            const docTokens = new Set(tokenize(docText));
            const docLower = (docText || '').toLowerCase();

            // Detect semantic categories in the doc — e.g. "baby stuff", "kitchen appliance"
            const categories = detectCategories(docText);
            const categoryBonusFor = (path) => {
                if (!categories.length) return 0;
                const pLower = path.toLowerCase();
                let bonus = 0;
                for (const cat of categories) {
                    if (cat.folderKeywords.some(fk => pLower.includes(fk.toLowerCase()))) {
                        bonus += 100; // strong weight — semantic category alignment dominates noise
                    }
                }
                return bonus;
            };

            let topFolder = null;
            let topScore = 0;
            for (const f of folders) {
                if (!f.files?.length) continue;
                if (isFolderExcluded(f)) continue;
                let s = 0;
                for (const t of tokenize(f.path)) if (docTokens.has(t)) s += 3;
                // Cap filename-token contributions per folder so a giant archive folder
                // can't beat a semantically correct folder via accumulated noise.
                let nameTokenHits = 0;
                for (const name of f.files) {
                    for (const t of tokenize(name)) if (docTokens.has(t)) nameTokenHits++;
                }
                s += Math.min(nameTokenHits, 15);
                s += categoryBonusFor(f.path);
                // Depth penalty — prefer shallower folders unless deeper one has a strong, unique match.
                // depth 1 (root) = 0 penalty, depth 2 = -3, depth 3 = -6, etc.
                const depth = f.path.split(PATH_SEP).length - 1;
                s -= depth * 3;
                if (s > topScore) { topScore = s; topFolder = f; }
            }

            const ext = (originalFilename.match(/\.[a-z0-9]+$/i) || [''])[0];
            const baseOriginal = originalFilename.replace(/\.[a-z0-9]+$/i, '');
            const docDate = extractDocDate(docText);
            let filename = originalFilename;
            let reasoning;

            // No folder keyword match — don't guess the folder, but still try to suggest a filename
            if (topScore === 0) {
                // Try the COMPANY - TYPE heuristic even without a folder match
                const { company, type } = guessCompanyAndType(docText);
                let guessedFilename = originalFilename;
                let why = 'No keyword overlap with any folder — pick a folder manually.';
                if (company && type) {
                    guessedFilename = `${company} - ${type}${ext}`;
                    why = `No folder matched. Guessed "${company} - ${type}" from document text — adjust as needed.`;
                } else if (company) {
                    guessedFilename = `${company}${ext}`;
                    why = `No folder matched. Detected "${company}" in document — filename is a rough guess.`;
                }
                return {
                    folder_path: '',
                    filename: guessedFilename,
                    confidence: 0.1,
                    reasoning: why,
                };
            }

            if (topFolder?.files?.length) {
                // Use the most recent filename in that folder as a template
                const example = topFolder.files[topFolder.files.length - 1];
                const exampleExt = (example.match(/\.[a-z0-9]+$/i) || [''])[0];
                const exampleBase = example.replace(/\.[a-z0-9]+$/i, '');
                let adapted = exampleBase;
                let note = '';

                if (docDate) {
                    // Detect date pattern in template AND preserve its separator style.
                    // Handles: YYYY-MM-DD, YYYY/MM/DD, YYYY.MM.DD, YYYY-MM, YYYY.MM, YYYY_MM etc.
                    const fullMatch = adapted.match(/\b(20\d{2})([-\/._])(\d{2})\2(\d{2})\b/);
                    if (fullMatch) {
                        const sep = fullMatch[2];
                        adapted = adapted.replace(fullMatch[0], `${docDate.year}${sep}${docDate.month}${sep}${docDate.day}`);
                    } else {
                        const monthMatch = adapted.match(/\b(20\d{2})([-\/._])(\d{2})\b/);
                        if (monthMatch) {
                            const sep = monthMatch[2];
                            adapted = adapted.replace(monthMatch[0], `${docDate.year}${sep}${docDate.month}`);
                        }
                    }
                    if (adapted !== exampleBase) {
                        note = `adapted from "${example}" using doc date ${docDate.year}-${docDate.month}-${docDate.day}`;
                    }
                }
                // "COMPANY - TITLE" pattern (typical for product manuals) → try to substitute.
                // Only replace what we ACTUALLY detected in the doc. Don't inherit half the
                // template's product type ("...Tongs.pdf") onto a doc that isn't about tongs.
                if (adapted === exampleBase && /\s-\s/.test(exampleBase)) {
                    const { company, type } = guessCompanyAndType(docText);
                    if (company && type) {
                        adapted = `${company} - ${type}`;
                        note = `detected "${company}" / "${type}" from the document`;
                    } else if (company) {
                        adapted = company;
                        note = `detected "${company}" from the document — add doc type manually`;
                    }
                    // If only type detected (no brand), don't risk a wrong brand. Leave template as-is below.
                }

                if (note) {
                    // We successfully adapted the template — always use original file's extension
                    filename = adapted + ext;
                    reasoning = `Matched "${topFolder.name}"; ${note}.`;
                } else {
                    // Couldn't adapt template. Try to build a name from the doc heuristic instead.
                    const { company: c2, type: t2 } = guessCompanyAndType(docText);
                    if (c2 && t2) {
                        filename = `${c2} - ${t2}${ext}`;
                        reasoning = `Matched "${topFolder.name}". Couldn't adapt template — used "${c2} - ${t2}" from document. Verify.`;
                    } else if (c2) {
                        filename = `${c2}${ext}`;
                        reasoning = `Matched "${topFolder.name}". Found brand "${c2}" in document — please add doc type. Example: "${example}".`;
                    } else {
                        filename = originalFilename;
                        reasoning = `Matched "${topFolder.name}". No identifiable info in doc. Example in folder: "${example}".`;
                    }
                }
            } else if (topFolder) {
                // Folder has no examples — fall back to docdate + original base
                if (docDate) {
                    filename = `${docDate.year}-${docDate.month}-${docDate.day} ${baseOriginal}${ext}`;
                    reasoning = `Matched "${topFolder.name}" by keyword. Folder is empty — prefixed original name with doc date.`;
                } else {
                    reasoning = `Matched "${topFolder.name}" by keyword. Folder is empty, no date found — keeping original filename.`;
                }
            } else {
                reasoning = `No keyword match. Pick a folder and adjust filename manually.`;
            }

            return {
                folder_path: topFolder?.path || '',
                filename,
                confidence: topFolder ? 0.5 : 0.2,
                reasoning,
            };
        };

        // Rank folders by keyword-overlap with the document text. Returns top N.
        // This keeps the prompt small regardless of how many folders exist.
        // If the document has no text (image-only), scores are all 0 — we fall back
        // to picking folders with the most existing files (assumed most active).
        const rankFoldersByRelevance = (folders, docText, topN = 150) => {
            const tokenize = (s) => (s || '').toLowerCase().match(/[a-z0-9]{3,}/g) || [];
            const docTokens = new Set(tokenize(docText));
            const categories = detectCategories(docText);
            const categoryBonusFor = (path) => {
                if (!categories.length) return 0;
                const pLower = path.toLowerCase();
                let bonus = 0;
                for (const cat of categories) {
                    if (cat.folderKeywords.some(fk => pLower.includes(fk.toLowerCase()))) bonus += 100;
                }
                return bonus;
            };
            const scored = folders
                .filter(f => f.files?.length && !isFolderExcluded(f))
                .map(f => {
                    let score = 0;
                    for (const t of tokenize(f.path)) if (docTokens.has(t)) score += 3;
                    let nameTokenHits = 0;
                    for (const name of f.files) {
                        for (const t of tokenize(name)) if (docTokens.has(t)) nameTokenHits++;
                    }
                    score += Math.min(nameTokenHits, 15);
                    score += categoryBonusFor(f.path);
                    return { f, score };
                });
            // Primary: relevance score. Tiebreaker: folders with more example files (more active).
            scored.sort((a, b) => (b.score - a.score) || ((b.f.files?.length || 0) - (a.f.files?.length || 0)));
            return scored.slice(0, topN).map(x => x.f);
        };

        const NAMING_PROMPT = `You are a personal document filing assistant. Your job is to look at a document and decide:
1. Which existing Drive folder it belongs in
2. What filename to give it that matches the naming convention of that folder

RULES:
- Pick ONE folder from the list below. Use its exact path.
- Study the example filenames in that folder and MATCH THE PATTERN (date format, ordering, words used, separators, casing, extension).
- If dates appear in the pattern, use the document's date — not today's date.
- Keep file extension from the original file.
- If uncertain, lower your confidence score.

Respond with STRICT JSON ONLY matching this schema:
{
  "folder_path": "the exact path string from the list",
  "filename": "the new filename with extension",
  "confidence": 0.0 to 1.0,
  "reasoning": "one short sentence on why"
}
`;

        // Fetch wrapper that auto-retries on 429 by waiting the server-specified delay.
        // Gemini's 429 response body includes details[].retryDelay (e.g. "28s").
        // `onWait(secondsRemaining, attempt, maxRetries)` fires each second during the wait
        // so the UI can show a live countdown.
        const fetchWithRetryOn429 = async (url, opts, options = {}) => {
            const { maxRetries = 2, onWait } = options;
            for (let attempt = 0; attempt <= maxRetries; attempt++) {
                const resp = await fetch(url, opts);
                if (resp.status !== 429 || attempt === maxRetries) return resp;
                // Parse retryDelay from error body
                let retrySec = 30;
                try {
                    const body = await resp.clone().text();
                    const err = JSON.parse(body);
                    const retryInfo = err?.error?.details?.find(d =>
                        (d['@type'] || '').includes('RetryInfo')
                    );
                    const s = retryInfo?.retryDelay;
                    if (s) retrySec = Math.min(120, parseFloat(String(s).replace('s', '')) || 30);
                } catch {}
                console.warn(`[Bos Page] 429 — waiting ${retrySec}s before retry (${attempt + 1}/${maxRetries})`);
                // Live countdown
                for (let left = retrySec; left > 0; left--) {
                    if (onWait) onWait(left, attempt + 1, maxRetries);
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
        };

        const callGemini = async (apiKey, payload, folderIndex, originalFilename, onRateLimitWait) => {
            if (!apiKey) throw new Error('No Gemini API key set. Add one in Settings.');
            if (!folderIndex || !folderIndex.folders?.length) throw new Error('Folder index not ready. Wait for indexing.');

            // Only include folders relevant to this document — keeps prompt under free-tier token caps
            const docText = payload.kind === 'text' ? payload.text : '';
            const rankedFolders = rankFoldersByRelevance(folderIndex.folders, docText, 150);
            const folderBlock = formatFolderIndex(rankedFolders);
            // Rough estimate: 4 chars per token
            console.log(`[Bos Page] Pre-ranked ${rankedFolders.length}/${folderIndex.folders.length} folders → ${folderBlock.length.toLocaleString()} chars (~${Math.round(folderBlock.length/4).toLocaleString()} tokens)`);
            const parts = [
                { text: NAMING_PROMPT },
                { text: `\nAVAILABLE FOLDERS:\n${folderBlock}\n` },
                { text: `\nORIGINAL FILENAME: ${originalFilename}\n` },
            ];
            if (payload.kind === 'text') {
                parts.push({ text: `\nDOCUMENT TEXT:\n${payload.text.slice(0, 30000)}` });
            } else if (payload.kind === 'image') {
                const base64 = payload.dataUrl.split(',')[1];
                parts.push({ inline_data: { mime_type: payload.mimeType, data: base64 } });
                parts.push({ text: '\n(Document is the image above — read it and extract what you need.)' });
            }

            const body = {
                contents: [{ parts }],
                generationConfig: {
                    temperature: 0.2,
                    responseMimeType: 'application/json',
                },
            };

            // maxRetries: 0 — if Gemini rate limits, we'd rather fall back to local pattern matching
            // immediately than make the user wait out a 50s backoff.
            const resp = await fetchWithRetryOn429(GEMINI_ENDPOINT(apiKey), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            }, { onWait: onRateLimitWait, maxRetries: 0 });
            if (!resp.ok) {
                const err = await resp.text();
                console.error('Gemini API error', resp.status, err);
                throw new Error(`Gemini API error ${resp.status}: ${err}`);
            }
            const data = await resp.json();
            const txt = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
            let parsed;
            try {
                parsed = JSON.parse(txt);
            } catch {
                // If model wrapped in backticks or anything, try to salvage
                const m = txt.match(/\{[\s\S]*\}/);
                if (!m) throw new Error('Gemini returned unparseable response: ' + txt.slice(0, 200));
                parsed = JSON.parse(m[0]);
            }
            return parsed;
        };

        // ============================================================
        // AUTH — Google Identity Services (GIS) only, no Firebase
        // ============================================================
        // One popup per user click. GIS handles OAuth; we call Google's userinfo
        // endpoint with the access token to get the email, then check the allowlist.

        // Wait for the GIS script (loaded async) to be ready
        const waitForGIS = () => new Promise((resolve, reject) => {
            if (window.google?.accounts?.oauth2) return resolve();
            const start = Date.now();
            const iv = setInterval(() => {
                if (window.google?.accounts?.oauth2) {
                    clearInterval(iv);
                    resolve();
                } else if (Date.now() - start > 10000) {
                    clearInterval(iv);
                    reject(new Error('Google Identity Services did not load within 10s — check your network / adblocker.'));
                }
            }, 50);
        });

        // Singleton token client. Callback is swapped per-request via the resolver ref below.
        let _tokenClient = null;
        let _pendingResolver = null;

        const getTokenClient = () => {
            if (_tokenClient) return _tokenClient;
            _tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: GOOGLE_SCOPES.join(' '),
                callback: (response) => {
                    if (_pendingResolver) {
                        _pendingResolver(response);
                        _pendingResolver = null;
                    }
                },
                error_callback: (err) => {
                    if (_pendingResolver) {
                        _pendingResolver({ error: err.type || 'token_error', error_description: err.message || String(err) });
                        _pendingResolver = null;
                    }
                },
            });
            return _tokenClient;
        };

        // Request a fresh access token. prompt='' = silent if consent cached, else popup.
        // prompt='consent' = always show consent screen. loginHint = email to prefill.
        const requestAccessToken = async (prompt = '', loginHint) => {
            await waitForGIS();
            return new Promise((resolve, reject) => {
                const client = getTokenClient();
                _pendingResolver = (response) => {
                    if (response.error) {
                        reject(new Error(response.error_description || response.error));
                    } else {
                        resolve(response);
                    }
                };
                const params = { prompt };
                if (loginHint) params.hint = loginHint;
                try {
                    client.requestAccessToken(params);
                } catch (e) {
                    _pendingResolver = null;
                    reject(e);
                }
            });
        };

        // Fetch user email/name from Google using the access token
        const fetchUserInfo = async (accessToken) => {
            const resp = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { Authorization: `Bearer ${accessToken}` },
            });
            if (!resp.ok) throw new Error(`userinfo failed: ${resp.status}`);
            return resp.json();
        };

        const useAuth = () => {
            // Hydrate from localStorage so a page refresh doesn't require re-signing in.
            const [user, setUser] = useState(() => {
                const email = storage.get(STORAGE_KEYS.userEmail);
                const name = storage.get(STORAGE_KEYS.userName);
                if (email && ALLOWED_EMAILS.includes(email)) {
                    return { email, displayName: name || email };
                }
                return null;
            });
            const [token, setToken] = useState(() => {
                const t = storage.get(STORAGE_KEYS.accessToken);
                const expiry = parseInt(storage.get(STORAGE_KEYS.accessTokenExpiry, '0'), 10);
                return (t && expiry > Date.now()) ? t : null;
            });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const persistToken = (accessToken, expiresInSec) => {
                const expiry = Date.now() + Math.max(60, (expiresInSec || 3600) - 300) * 1000;
                setToken(accessToken);
                storage.set(STORAGE_KEYS.accessToken, accessToken);
                storage.set(STORAGE_KEYS.accessTokenExpiry, String(expiry));
            };

            const persistUser = (email, name) => {
                const u = { email, displayName: name || email };
                setUser(u);
                storage.set(STORAGE_KEYS.userEmail, email);
                storage.set(STORAGE_KEYS.userName, u.displayName);
            };

            const signIn = useCallback(async () => {
                setError(null);
                setLoading(true);
                try {
                    // One popup: GIS gets consent + issues the access token
                    const resp = await requestAccessToken(''); // no login hint — let user pick
                    const info = await fetchUserInfo(resp.access_token);
                    if (!ALLOWED_EMAILS.includes(info.email)) {
                        // Revoke so we don't leak access
                        try { google.accounts.oauth2.revoke(resp.access_token, () => {}); } catch {}
                        throw new Error(`${info.email} is not authorized for this app.`);
                    }
                    persistUser(info.email, info.name);
                    persistToken(resp.access_token, resp.expires_in);
                } catch (e) {
                    console.error('signIn failed:', e);
                    setError(e.message || 'Sign-in failed');
                } finally {
                    setLoading(false);
                }
            }, []);

            const signOut = useCallback(async () => {
                const current = storage.get(STORAGE_KEYS.accessToken);
                if (current && window.google?.accounts?.oauth2) {
                    try { google.accounts.oauth2.revoke(current, () => {}); } catch {}
                }
                [STORAGE_KEYS.accessToken, STORAGE_KEYS.accessTokenExpiry,
                 STORAGE_KEYS.folderIndex, STORAGE_KEYS.folderIndexTs,
                 STORAGE_KEYS.userEmail, STORAGE_KEYS.userName].forEach(k => storage.del(k));
                setToken(null);
                setUser(null);
            }, []);

            // Re-request Drive token (silent if possible)
            const refreshToken = useCallback(async () => {
                setError(null);
                try {
                    const email = user?.email;
                    try {
                        const resp = await requestAccessToken('', email);
                        persistToken(resp.access_token, resp.expires_in);
                        return resp.access_token;
                    } catch (silentErr) {
                        console.log('Silent token request failed, showing consent:', silentErr.message);
                        const resp = await requestAccessToken('consent', email);
                        persistToken(resp.access_token, resp.expires_in);
                        return resp.access_token;
                    }
                } catch (e) {
                    console.error('refreshToken failed:', e);
                    setError('Could not get Drive access: ' + (e.message || e));
                }
                return null;
            }, [user]);

            return { user, token, loading, error, signIn, signOut, refreshToken };
        };

        // ============================================================
        // CASCADING FOLDER PICKER — hierarchical navigation.
        // Shows one dropdown per path level. Picking a value at a level updates the
        // selection and automatically shows the next level if that folder has children.
        // ============================================================
        const CascadingFolderPicker = ({ folders, selectedId, onChange, disabled }) => {
            // Derive breadcrumbs from the currently-selected folder's path
            const selected = folders.find(f => f.id === selectedId);
            const crumbs = selected ? selected.path.split(PATH_SEP) : [];

            // All folders at a given depth under a given parent path
            const childrenOfPath = useMemo(() => {
                return (parentPath) => {
                    const parentDepth = parentPath ? parentPath.split(PATH_SEP).length : 0;
                    return folders
                        .filter(f => {
                            const parts = f.path.split(PATH_SEP);
                            if (parts.length !== parentDepth + 1) return false;
                            if (parentDepth === 0) return true;
                            return parts.slice(0, parentDepth).join(PATH_SEP) === parentPath;
                        })
                        .sort((a, b) => a.name.localeCompare(b.name));
                };
            }, [folders]);

            // Build the levels to render: one per selected crumb, plus one "next" level
            // (for going deeper) if the current selection has children.
            const levels = [];
            // Level 0 — roots
            levels.push({
                parentPath: '',
                selectedName: crumbs[0] || '',
                options: childrenOfPath(''),
                labelWhenEmpty: 'Pick root folder…',
            });
            // Deeper levels — only if preceding level has a selection
            for (let i = 0; i < crumbs.length; i++) {
                const parentPath = crumbs.slice(0, i + 1).join(PATH_SEP);
                const options = childrenOfPath(parentPath);
                if (options.length === 0) break;
                levels.push({
                    parentPath,
                    selectedName: crumbs[i + 1] || '',
                    options,
                    labelWhenEmpty: 'Go deeper (optional)…',
                });
            }

            const handleLevelChange = (levelIdx, pickedName) => {
                if (!pickedName) {
                    // Deselect — move selection up one level, or clear entirely
                    if (levelIdx === 0) {
                        onChange('');
                    } else {
                        const newPath = crumbs.slice(0, levelIdx).join(PATH_SEP);
                        const parent = folders.find(f => f.path === newPath);
                        onChange(parent?.id || '');
                    }
                    return;
                }
                const level = levels[levelIdx];
                const picked = level.options.find(o => o.name === pickedName);
                if (picked) onChange(picked.id);
            };

            return (
                <div className="space-y-2">
                    {levels.map((level, idx) => (
                        <select
                            key={idx}
                            value={level.selectedName}
                            disabled={disabled}
                            onChange={e => handleLevelChange(idx, e.target.value)}
                            className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400 bg-white disabled:opacity-50"
                        >
                            <option value="">{level.labelWhenEmpty}</option>
                            {level.options.map(o => (
                                <option key={o.id} value={o.name}>{o.name}</option>
                            ))}
                        </select>
                    ))}
                    {selected && (
                        <div className="text-xs text-slate-500 mt-1">
                            📁 {displayPath(selected.path)}
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // REVIEW CARD — shared by Upload and Inbox tabs
        // Represents one file in various states (processing, proposing, filing, done).
        // ============================================================
        const ReviewCard = ({ item, folderIndex, onChange, onConfirm, onSkip, onRetry, onFileAnyway }) => {

                if (c >= 0.4) return { text: 'Low confidence', className: 'bg-amber-100 text-amber-700' };

                        <div className="min-w-0 flex-1">

                        {badge && (

                    {previewOpen && pageCount > 0 && (

                            className="fixed inset-0 bg-black/90 z-50 overflow-y-auto cursor-zoom-out"

                            <div className="min-h-full flex flex-col items-center py-8 gap-4 px-4">
                                {pages.map((url, i) => (
                                    <img
                                        key={i}
                                        src={url}
                                        alt={`page ${i + 1}`}
                                        className="max-w-5xl w-full rounded shadow-2xl"
                                        onClick={(e) => e.stopPropagation()}
                                    />

                                <button
                                    onClick={() => setPreviewOpen(false)}
                                    className="fixed top-4 right-4 bg-white/90 text-slate-900 px-3 py-1.5 rounded-full text-sm font-medium"
                                >
                                    Close
                                </button>
                            </div>

                    )}

                    {status === 'processing' && (
                        <div className="flex items-center gap-2 text-sm text-slate-500">
                            <Spinner size={14} /> Analyzing document…
                        </div>

                    {status === 'waiting' && (
                        <div className="flex items-center justify-between gap-2 text-sm text-amber-700 bg-amber-50 border border-amber-100 rounded-lg p-3">

                    {status === 'duplicate' && dupeOf && (
                        <div className="text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded-lg p-3">
                            <div className="font-semibold mb-1 flex items-center gap-2">

                                <span>Duplicate detected</span>

                            <div className="text-xs text-rose-700 mb-3">
                                Already filed as <span className="font-medium">{dupeOf.filename}</span>
                                {dupeOf.folderPath && <> in <span className="font-medium">{dupeOf.folderPath}</span></>}
                                {dupeOf.when && <> ({new Date(dupeOf.when).toLocaleDateString()})</>}.
                            </div>
                            <div className="flex flex-wrap gap-2 text-xs">
                                {dupeOf.webViewLink && (

                                        Open existing

                                )}
                                <button onClick={() => onSkip(item.id)} className="px-3 py-1.5 bg-slate-900 text-white rounded-lg font-medium">
                                    Skip (recommended)
                                </button>
                                {onFileAnyway && (
                                    <button onClick={() => onFileAnyway(item.id)} className="px-3 py-1.5 bg-white border border-rose-200 rounded-lg">
                                        File anyway
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    {status === 'error' && (
                        <div className="text-sm text-red-600 bg-red-50 border border-red-100 rounded-lg p-3">
                            {error}
                            <div className="flex gap-3 mt-2 text-xs">
                                {onRetry && (
                                    <button onClick={() => onRetry(item.id)} className="underline font-medium">Retry</button>
                                )}
                                <button onClick={() => onSkip(item.id)} className="underline">Dismiss</button>
                            </div>
                        </div>
                    )}

                    {status === 'done' && (
                        <div className="flex items-center justify-between text-sm text-emerald-700 bg-emerald-50 border border-emerald-100 rounded-lg p-3">
                            <span>✓ Filed as <span className="font-medium">{edits.filename}</span></span>
                            {webViewLink && (
                                <a href={webViewLink} target="_blank" rel="noopener" className="text-xs underline">Open</a>
                            )}
                        </div>
                    )}

                    {(status === 'ready' || status === 'uploading') && (
                        <>
                            <div className="mb-3">
                                <label className="block text-xs text-slate-500 mb-1">Folder</label>
                                <CascadingFolderPicker
                                    folders={folderIndex?.folders || []}
                                    selectedId={edits.folderId}
                                    onChange={(id) => onChange(item.id, { ...edits, folderId: id })}
                                    disabled={status === 'uploading'}
                                />
                            </div>
                            <div className="mb-3">
                                <label className="block text-xs text-slate-500 mb-1">Filename</label>
                                <input
                                    type="text"
                                    value={edits.filename || ''}
                                    onChange={e => onChange(item.id, { ...edits, filename: e.target.value })}
                                    disabled={status === 'uploading'}
                                    className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400"
                                />
                            </div>
                            {proposal?.reasoning && (
                                <div className="text-xs text-slate-500 mb-3 italic">💭 {proposal.reasoning}</div>
                            )}
                            <div className="flex gap-2">
                                <button
                                    onClick={() => onConfirm(item.id)}
                                    disabled={status === 'uploading' || !edits.folderId || !edits.filename}

                                >
                                    {status === 'uploading' ? <><Spinner size={14}/> Filing…</> : 'File it'}
                                </button>
                                <button
                                    onClick={() => onSkip(item.id)}
                                    disabled={status === 'uploading'}
                                    className="px-4 bg-slate-100 text-slate-700 rounded-lg py-2 text-sm font-medium active:scale-[0.98]"
